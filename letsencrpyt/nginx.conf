server {
    listen 80;
    server_name link.test.co.kr;

    access_log /logs/nginx/test-access.log;
    error_log  /logs/nginx/test-error.log warn;

    proxy_buffering off;
    client_max_body_size 20M;

    location ^~ /.well-known/acme-challenge/ {
         # root /sw/web/link.test;
        alias /sw/web/link.test/.well-known/acme-challenge/;
    }

    location / {
        return 301 https://gmc-linkbio.pages.dev;
    }
}


server {
    server_tokens off;
    listen 443 ssl;
    http2 on;
    server_name link.test.co.kr;

    access_log /logs/nginx/link-test-tls-access.log;
    error_log  /logs/nginx/link-test-tls-error.log warn;

    proxy_buffering off;
    client_max_body_size 20M;

    add_header Strict-Transport-Security "max-age=31536000;";

    ssl_certificate /etc/letsencrypt/live/link.test.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/link.test.co.kr/privkey.pem;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:MEDIUM:!aNULL:!MD5:!RC4:!DES-CBC3-SHA:!DHE-RSA-DES-CBC3-SHA:!ECDHE-RSA-DES-CBC3-SHA:!IDEA-CBC-SHA:!EDH-RSA-DES-CBC3-SHA;
    ssl_session_cache shared:SSL:10m;

    location ^~ /.well-known/acme-challenge/ {
            proxy_set_header HOST                    $http_host;
            proxy_set_header X-Forwarded-Proto       $scheme;
            proxy_set_header X-Real-IP               $remote_addr;
            proxy_set_header X-Forwarded-Port        $server_port;
            proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
            proxy_set_header Referer                 $http_referer;
            proxy_set_header X-NginX-Proxy              true;
            proxy_set_header X-SSL-Server               true;
            proxy_read_timeout 150;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_redirect off;
            proxy_pass_header Server;
            autoindex off;
            charset utf-8;
            root /sw/web/link.test/.well-known/acme-challenge/;
        }

    location / {
         return 301 https://gmc-linkbio.pages.dev;
        }

 }
