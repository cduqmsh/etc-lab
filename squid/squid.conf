# Example rule allowing access from your local networks.
# Adapt to list your (internal) IP networks from where browsing
# should be allowed
acl localnet src 10.10.1.0/24   # RFC1918 possible internal network
acl localnet src 10.10.2.0/24   # RFC1918 possible internal network
acl localnet src 10.10.4.0/24   # RFC1918 possible internal network
acl localnet src 10.10.10.0/24  # RFC1918 possible internal network
acl localnet src 10.10.20.0/24  # RFC1918 possible internal network
acl localnet src 10.10.23.0/24  # RFC1918 possible internal network
# 허용 할 네트워크 대역 


acl SSL_ports port 443
acl Safe_ports port 80          # http
acl Safe_ports port 21          # ftp
acl Safe_ports port 443         # https
